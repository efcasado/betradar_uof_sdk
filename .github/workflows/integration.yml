name: integration

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pulsar-transport:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: efcasado/pulsar-connectors
          ref: improve/rabbitmq-source-connector
          path: pulsar-connectors
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - uses: jdx/mise-action@v4
      - run: mix deps.get
      - name: Build RabbitMQ connector
        run: pulsar-connectors/gradlew -p pulsar-connectors :rabbitmq:assemble
      - name: Locate RabbitMQ connector NAR
        run: echo "RABBITMQ_CONNECTOR_NAR=$(find "$GITHUB_WORKSPACE/pulsar-connectors/rabbitmq/build/libs" -maxdepth 1 -name 'rabbitmq-*.nar' -print -quit)" >> "$GITHUB_ENV"
      - run: docker compose up --detach --wait
      - run: mix test --only integration
      - name: Stop integration services
        if: always()
        run: RABBITMQ_CONNECTOR_NAR="${RABBITMQ_CONNECTOR_NAR:-/tmp/rabbitmq.nar}" docker compose down --volumes --remove-orphans
